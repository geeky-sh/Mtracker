version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mtracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mtracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mtracker_secret}
      POSTGRES_DB: ${POSTGRES_DB:-mtracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mtracker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: mtracker-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "${PORT:-8080}:8080"

volumes:
  postgres_data:
