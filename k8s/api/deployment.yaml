apiVersion: apps/v1
kind: Deployment
metadata:
  name: mtracker-api
  namespace: mtracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mtracker-api
  template:
    metadata:
      labels:
        app: mtracker-api
    spec:
      containers:
        - name: api
          image: ghcr.io/aash/mtracker-api:latest   # update with your registry
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
