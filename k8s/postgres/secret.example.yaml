# Copy to secret.yaml, fill in base64-encoded values, and apply.
# Generate: echo -n 'your_value' | base64
# secret.yaml is gitignored.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: mtracker
type: Opaque
data:
  POSTGRES_USER: bXRyYWNrZXI=         # mtracker
  POSTGRES_PASSWORD: bXRyYWNrZXJfc2VjcmV0  # mtracker_secret
  POSTGRES_DB: bXRyYWNrZXI=           # mtracker
